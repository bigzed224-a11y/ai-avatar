<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Avatar - Real-Time Pose</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.4.1646424915/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        .realtime-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .webcam-panel, .avatar-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .panel-header h2 {
            font-size: 1rem;
            color: var(--gray-700);
        }
        
        .live-badge {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .video-container {
            position: relative;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }
        
        #webcam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #avatar-canvas {
            width: 100%;
            height: 100%;
        }
        
        .pose-overlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        
        .pose-values {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        
        .pose-item {
            background: var(--gray-50);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .pose-item label {
            display: block;
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-bottom: 4px;
        }
        
        .pose-item span {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray-700);
        }
        
        .controls-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .controls-row button {
            flex: 1;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-300);
        }
        
        .connection-dot.connected {
            background: var(--success);
        }
        
        @media (max-width: 768px) {
            .realtime-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Real-Time Pose Detection</h1>
            <p>Your movements drive the avatar in real-time!</p>
        </header>

        <div class="status-bar">
            <div class="connection-status">
                <span class="connection-dot" id="ws-status"></span>
                <span id="ws-status-text">Disconnected</span>
            </div>
            <a href="index.html" class="text-btn">← Back to Lip-Sync</a>
        </div>

        <main>
            <!-- Setup Section -->
            <section class="step active" id="setup-section">
                <div class="step-header">
                    <span class="step-number">1</span>
                    <h2>Upload Avatar Photo</h2>
                </div>
                <div class="upload-area" id="drop-zone">
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <p>Drop your character photo here</p>
                    <input type="file" id="photo-input" accept="image/*" hidden>
                </div>
                <div id="preview-container" class="hidden">
                    <img id="photo-preview" alt="Avatar" style="max-width: 200px; border-radius: 8px;">
                    <p id="photo-name"></p>
                </div>
            </section>

            <!-- Real-Time Section -->
            <section class="step" id="realtime-section">
                <div class="step-header">
                    <span class="step-number">2</span>
                    <h2>Real-Time Control</h2>
                </div>
                
                <div class="realtime-container">
                    <!-- Webcam Panel -->
                    <div class="webcam-panel">
                        <div class="panel-header">
                            <h2>Your Camera</h2>
                            <span class="live-badge">LIVE</span>
                        </div>
                        <div class="video-container">
                            <video id="webcam-video" autoplay playsinline></video>
                            <canvas id="pose-canvas" style="display: none;"></canvas>
                            <div class="pose-overlay" id="pose-overlay">
                                Pose: Waiting...
                            </div>
                        </div>
                        
                        <div class="pose-values">
                            <div class="pose-item">
                                <label>Tilt</label>
                                <span id="val-tilt">0.00</span>
                            </div>
                            <div class="pose-item">
                                <label>Nod</label>
                                <span id="val-nod">0.00</span>
                            </div>
                            <div class="pose-item">
                                <label>Turn</label>
                                <span id="val-turn">0.00</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="avatar-panel">
                        <div class="panel-header">
                            <h2>Avatar</h2>
                            <span class="live-badge">LIVE</span>
                        </div>
                        
                        <div class="video-container">
                            <canvas id="avatar-canvas"></canvas>
                        </div>
                        
                        <div class="controls-row">
                            <button id="start-btn" class="primary-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                                Start Camera
                            </button>
                            <button id="stop-btn" class="secondary-btn" disabled>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="6" y="6" width="12" height="12"></rect>
                                </svg>
                                Stop
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>AI Avatar Lip-Sync | Real-Time Pose Detection</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script src="realtime.js"></script>
</body>
</html>
